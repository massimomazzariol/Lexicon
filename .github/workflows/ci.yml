name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-tools:
    name: Node Tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test (all Node tools)
        run: find tools -name '*.test.mjs' -print0 | xargs -0 node --test
