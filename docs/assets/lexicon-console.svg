  <text x="18.0" y="44" fill="#56b6c2" xml:space="preserve">──────────────────────────────────────────────────────</text><text x="26.4" y="66" fill="#56b6c2" font-weight="700" xml:space="preserve">LEXICON</text><text x="85.2" y="66" fill="#5c6370" xml:space="preserve">  ·  multilingual vocabulary builder</text><text x="18.0" y="88" fill="#56b6c2" xml:space="preserve">──────────────────────────────────────────────────────</text><text x="26.4" y="110" fill="#e6e6e6" font-weight="700" xml:space="preserve">551</text><text x="51.6" y="110" fill="#5c6370" xml:space="preserve"> words total    </text><text x="186.0" y="110" fill="#7f848e" xml:space="preserve">A1 </text><text x="211.2" y="110" fill="#e6e6e6" font-weight="700" xml:space="preserve">204</text><text x="261.6" y="110" fill="#7f848e" xml:space="preserve">A2 </text><text x="286.8" y="110" fill="#e6e6e6" font-weight="700" xml:space="preserve">113</text><text x="337.2" y="110" fill="#7f848e" xml:space="preserve">B1 </text><text x="362.4" y="110" fill="#e6e6e6" font-weight="700" xml:space="preserve">106</text><text x="412.8" y="110" fill="#7f848e" xml:space="preserve">B2 </text><text x="438.0" y="110" fill="#e6e6e6" font-weight="700" xml:space="preserve">86</text><text x="480.0" y="110" fill="#7f848e" xml:space="preserve">C1 </text><text x="505.2" y="110" fill="#e6e6e6" font-weight="700" xml:space="preserve">34</text><text x="547.2" y="110" fill="#7f848e" xml:space="preserve">C2 </text><text x="572.4" y="110" fill="#e6e6e6" font-weight="700" xml:space="preserve">8</text><text x="26.4" y="132" fill="#5c6370" xml:space="preserve">still needs work:</text><text x="169.2" y="132" fill="#5c6370" xml:space="preserve">  definitions </text><text x="286.8" y="132" fill="#98c379" font-weight="700" xml:space="preserve">0</text><text x="295.2" y="132" fill="#5c6370" xml:space="preserve">   synonyms </text><text x="396.0" y="132" fill="#e5c07b" font-weight="700" xml:space="preserve">454</text><text x="421.2" y="132" fill="#5c6370" xml:space="preserve">   examples </text><text x="522.0" y="132" fill="#e5c07b" font-weight="700" xml:space="preserve">3</text><text x="18.0" y="176" fill="#e6e6e6" font-weight="700" xml:space="preserve">What do you want to do?</text><text x="34.8" y="198" fill="#56b6c2" font-weight="700" xml:space="preserve">1</text><text x="60.0" y="198" fill="#e6e6e6" font-weight="700" xml:space="preserve">Add common words for a level</text><text x="295.2" y="198" fill="#5c6370" xml:space="preserve">  - the AI suggests CEFR words - you pick which to keep</text><text x="34.8" y="220" fill="#56b6c2" font-weight="700" xml:space="preserve">2</text><text x="60.0" y="220" fill="#e6e6e6" font-weight="700" xml:space="preserve">Find a word</text><text x="152.4" y="220" fill="#5c6370" xml:space="preserve">  - check if a word already exists - typos &amp; similar words are caught</text><text x="34.8" y="242" fill="#56b6c2" font-weight="700" xml:space="preserve">3</text><text x="60.0" y="242" fill="#e6e6e6" font-weight="700" xml:space="preserve">Browse words</text><text x="160.8" y="242" fill="#5c6370" xml:space="preserve">  - list the words already in the lexicon - filter by level or text</text><text x="34.8" y="264" fill="#56b6c2" font-weight="700" xml:space="preserve">4</text><text x="60.0" y="264" fill="#e6e6e6" font-weight="700" xml:space="preserve">Edit a word</text><text x="152.4" y="264" fill="#5c6370" xml:space="preserve">  - change definitions, synonyms, antonyms, examples by hand - tracked, no AI</text><text x="34.8" y="286" fill="#56b6c2" font-weight="700" xml:space="preserve">5</text><text x="60.0" y="286" fill="#e6e6e6" font-weight="700" xml:space="preserve">Add one specific word</text><text x="236.4" y="286" fill="#5c6370" xml:space="preserve">  - type a word (typos ok) - the AI corrects &amp; connects it</text><text x="34.8" y="308" fill="#56b6c2" font-weight="700" xml:space="preserve">6</text><text x="60.0" y="308" fill="#e6e6e6" font-weight="700" xml:space="preserve">Grow from gaps</text><text x="177.6" y="308" fill="#5c6370" xml:space="preserve">  - add words other entries point to but that are still missing</text><text x="34.8" y="330" fill="#56b6c2" font-weight="700" xml:space="preserve">7</text><text x="60.0" y="330" fill="#e6e6e6" font-weight="700" xml:space="preserve">Autopilot - fill what is missing</text><text x="328.8" y="330" fill="#5c6370" xml:space="preserve">  - runs on its own: fills, publishes &amp; pushes live, chunk by chunk</text><text x="34.8" y="352" fill="#56b6c2" font-weight="700" xml:space="preserve">8</text><text x="60.0" y="352" fill="#e6e6e6" font-weight="700" xml:space="preserve">Review AI suggestions</text><text x="236.4" y="352" fill="#5c6370" xml:space="preserve">  - approve or reject the items waiting for a human</text><text x="34.8" y="374" fill="#56b6c2" font-weight="700" xml:space="preserve">9</text><text x="60.0" y="374" fill="#e6e6e6" font-weight="700" xml:space="preserve">Status report</text><text x="169.2" y="374" fill="#5c6370" xml:space="preserve">  - see what is done and what still needs work</text><text x="34.8" y="396" fill="#56b6c2" font-weight="700" xml:space="preserve">10</text><text x="68.4" y="396" fill="#e6e6e6" font-weight="700" xml:space="preserve">Publish</text><text x="127.2" y="396" fill="#5c6370" xml:space="preserve">  - build the packs + push to GitHub so consumers pick them up</text><text x="34.8" y="418" fill="#56b6c2" font-weight="700" xml:space="preserve">11</text><text x="68.4" y="418" fill="#e6e6e6" font-weight="700" xml:space="preserve">Quit</text><text x="18.0" y="462" fill="#56b6c2" xml:space="preserve">&gt; pick 1-11: </text>
</svg>
